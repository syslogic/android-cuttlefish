name: RPM Builder

on:
  push:
  pull_request:
    paths:
      - '.github/workflows/rpm-builder.yml'
      - '.github/workflows/reusable-docker.yml'
      - 'docker/rpm-builder/**'
      - 'tools/rpmbuild/**'

env:

  RUNNER_VERSION: '22.04'

  IMAGE_VERSION: '9.5'

  RUNNER_X86: ubuntu-22.04
  RUNNER_ARM: ubuntu-22.04-arm

  IMAGE_X86: rockylinux/rockylinux:9.5
  IMAGE_ARM: rockylinux/rockylinux:9.5

jobs:

  # Setting up the Linux versions, which the runners & base images will use.
  declare_versions:
    runs-on: ubuntu-22.04
    outputs:
      RUNNER_X86: ${{ STEPS.SETUP.OUTPUTS.RUNNER_X86 }}
      RUNNER_ARM: ${{ STEPS.SETUP.OUTPUTS.RUNNER_ARM }}
      IMAGE_X86: ${{ STEPS.SETUP.OUTPUTS.IMAGE_X86 }}
      IMAGE_ARM: ${{ STEPS.SETUP.OUTPUTS.IMAGE_ARM }}
    steps:
      - name: Declare Linux Versions
        shell: bash
        id: setup
        run: |
          echo "RUNNER_X86=${{ ENV.RUNNER_X86 }}" >> $GITHUB_ENV
          echo "RUNNER_ARM=${{ ENV.RUNNER_ARM }}" >> $GITHUB_ENV
          echo "IMAGE_X86=${{ ENV.IMAGE_X86 }}" >> $GITHUB_ENV
          echo "IMAGE_ARM=${{ ENV.IMAGE_ARM }}" >> $GITHUB_ENV

          echo "RUNNER_X86=${{ ENV.RUNNER_X86 }}" >> $GITHUB_OUTPUT
          echo "RUNNER_ARM=${{ ENV.RUNNER_ARM }}" >> $GITHUB_OUTPUT
          echo "IMAGE_X86=${{ ENV.IMAGE_X86 }}" >> $GITHUB_OUTPUT
          echo "IMAGE_ARM=${{ ENV.IMAGE_ARM }}" >> $GITHUB_OUTPUT

          echo "Linux versions used by GitHub runners and Docker base images." >> $GITHUB_STEP_SUMMARY
          echo "These variables are defined in \`workflows/rpm-builder.yml\` ..." >> $GITHUB_STEP_SUMMARY
          echo " - Ubuntu Linux \`${{ ENV.RUNNER_VERSION }}\`  " >> $GITHUB_STEP_SUMMARY
          echo " - Rocky Linux \`${{ ENV.IMAGE_VERSION }}\`" >> $GITHUB_STEP_SUMMARY

  create_image:
    runs-on: ${{ NEEDS.LINUX_VERSIONS.OUTPUTS.RUNNER_X86 }}
    needs: [ declare_versions ]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        platform: [ linux/amd64, linux/arm64 ]
        include:
          - runner: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.RUNNER_X86 }}
            linux: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.IMAGE_X86 }}
            image: rpm-builder-amd64
            platform: linux/amd64
          - runner: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.RUNNER_ARM }}
            linux: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.IMAGE_ARM }}
            image: rpm-builder-arm64
            platform: linux/arm64
    steps:

      - id: setup
        shell: bash
        run: |
          echo "ARTIFACT_NAME=android-cuttlefish-rhel9-${${{ RUNNER.ARCH }},,}-unsigned" >> $GITHUB_ENV
          env

      - uses: 'actions/checkout@v4'
      - uses: 'docker/login-action@v3'
        id: container-registry
        with:
          registry: 'ghcr.io'
          username: ${{ GITHUB.ACTOR }}
          password: ${{ SECRETS.GITHUB_TOKEN }}

      # https://github.com/docker/metadata-action
      - uses: 'docker/metadata-action@v5'
        id: metadata
        with:
          images: ghcr.io/${{ GITHUB.ACTOR }}/${{ MATRIX.IMAGE }}
          tags: |
            type=sha
            latest

      # https://github.com/marketplace/actions/build-and-push-docker-images
      - uses: 'docker/setup-buildx-action@v3'
      - uses: 'docker/setup-qemu-action@v3'
        if: ${{ MATRIX.PLATFORM != 'linux/amd64' }}
        with:
          platforms: arm64

      - uses: 'docker/build-push-action@v6'
        id: build
        with:
          context: .
          file: docker/rpm-builder/Dockerfile
          push: ${{ GITHUB.EVENT_NAME != 'pull_request' }}
          platforms: ${{ MATRIX.PLATFORM }}
          labels: ${{ STEPS.METADATA.OUTPUTS.LABELS }}
          tags: ${{ STEPS.METADATA.OUTPUTS.TAGS }}
          target: builder
          build-args: |
            LINUX_IMAGE=${{ MATRIX.LINUX }}
            GITHUB_USER=${{ GITHUB.ACTOR }}
            GITHUB_REPO=${{ ENV.REPO_NAME }}
            GITHUB_BRANCH=${{ GITHUB.HEAD_REF || GITHUB.REF_NAME }}
          # PGP_SIGNATURE=${{ INPUTS.PGP_SIGNATURE }}
          # PGP_PASSPHRASE=${{ INPUTS.PGP_PASSPHRASE }}

      # Note: The digest comes from `buildx`, not the metadata.
      # https://github.com/actions/attest-build-provenance
      - uses: 'actions/attest-build-provenance@v2'
        with:
          subject-name: ghcr.io/${{ GITHUB.ACTOR }}/${{ MATRIX.IMAGE }}
          subject-digest: ${{ STEPS.BUILD.OUTPUTS.DIGEST }}
          push-to-registry: true

  # This must be a job, in order to pass `secrets`.
  build_packages:
    uses: ./.github/workflows/reusable-docker.yml
#   needs: [ declare_versions, create_image ]
    needs: [ create_image ]
    secrets:
#     TODO: RPM repository PGP signature & passphrase would be required to sign RPM packages.
#     pgp_signature: ${{ SECRETS.PGP_SIGNATURE }}
#     pgp_passphrase: ${{ SECRETS.PGP_PASSPHRASE }}
      token: ${{ SECRETS.GITHUB_TOKEN }}
    with:
      registry: 'ghcr.io'
      username: ${{ GITHUB.ACTOR }}
      repository: ${{ GITHUB.EVENT.REPOSITORY.NAME }}
      branch: ${{ GITHUB.HEAD_REF || GITHUB.REF_NAME }}
      platform: ${{ MATRIX.PLATFORM }}
      runner: ${{ MATRIX.RUNNER }}
      linux: ${{ MATRIX.LINUX }}
      image: ${{ MATRIX.IMAGE }}
    strategy:
      max-parallel: 2
      matrix:
        platform: [ linux/amd64, linux/arm64 ]
        include:
#         - runner: ${{ NEEDS.LINUX_VERSIONS.OUTPUTS.RUNNER_X86 }}
#           linux: ${{ NEEDS.LINUX_VERSIONS.OUTPUTS.IMAGE_X86 }}
          - runner: ubuntu-22.04
            linux: rockylinux/rockylinux:9.5
            image: rpm-builder-amd64
            platform: linux/amd64
#         - runner: ${{ NEEDS.LINUX_VERSIONS.OUTPUTS.RUNNER_ARM }}
#           linux: ${{ NEEDS.LINUX_VERSIONS.OUTPUTS.IMAGE_ARM }}
          - runner: ubuntu-22.04-arm
            linux: rockylinux/rockylinux:9.5
            image: rpm-builder-arm64
            platform: linux/arm64


  # This must be a job, in order to pass `secrets`.
  preinstall_integration:
    uses: ./.github/workflows/rhel-integration.yml
#   needs: [ declare_versions, build_packages ]
    needs: [ build_packages ]
    secrets:
      token: ${{ SECRETS.GITHUB_TOKEN }}
    with:
      registry: 'ghcr.io'
      username: ${{ GITHUB.ACTOR }}
      platform: ${{ MATRIX.PLATFORM }}
      runner: ${{ MATRIX.RUNNER }}
      linux: ${{ MATRIX.LINUX }}
      image: ${{ MATRIX.IMAGE }}

    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        platform: [ linux/amd64, linux/arm64 ]
        include:
#         - runner: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.RUNNER_X86 }}
#           linux: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.IMAGE_X86 }}
          - runner: ubuntu-22.04
            linux: rockylinux/rockylinux:9.5
            image: rhel-integration-amd64
            platform: linux/amd64
#         - runner: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.RUNNER_ARM }}
#           linux: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.IMAGE_ARM }}
          - runner: ubuntu-22.04-arm
            linux: rockylinux/rockylinux:9.5
            image: rhel-integration-arm64
            platform: linux/arm64


  # This must be a job, in order to pass `secrets`.
  preinstall_orchestration:
    uses: ./.github/workflows/rhel-orchestration.yml
#   needs: [ declare_versions, build_packages ]
    needs: [ build_packages ]
    secrets:
      token: ${{ SECRETS.GITHUB_TOKEN }}
    with:
      registry: 'ghcr.io'
      username: ${{ GITHUB.ACTOR }}
      platform: ${{ MATRIX.PLATFORM }}
      runner: ${{ MATRIX.RUNNER }}
      linux: ${{ MATRIX.LINUX }}
      image: ${{ MATRIX.IMAGE }}
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        platform: [ linux/amd64, linux/arm64 ]
        include:
#         - runner: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.RUNNER_X86 }}
#           linux: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.IMAGE_X86 }}
          - runner: ubuntu-22.04
            linux: rockylinux/rockylinux:9.5
            image: rhel-orchestration-amd64
            platform: linux/amd64
#         - runner: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.RUNNER_ARM }}
#           linux: ${{ NEEDS.DECLARE_VERSIONS.OUTPUTS.IMAGE_ARM }}
          - runner: ubuntu-22.04-arm
            linux: rockylinux/rockylinux:9.5
            image: rhel-orchestration-arm64
            platform: linux/arm64