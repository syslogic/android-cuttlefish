name: Reusable Docker Container Run

on:
  workflow_call:
    secrets:
      token:
        required: true
    inputs:
      registry:
        default: 'ghcr.io'
        required: false
        type: string
      username:
        required: true
        type: string
      image:
        required: true
        type: string
      tag:
        default: latest
        required: false
        type: string
      runner:
          default: ubuntu-latest
          required: false
          type: string
      platform:
        default: linux/amd64
        required: false
        type: string

jobs:

  docker-run:
    runs-on: ${{ INPUTS.RUNNER }}
    outputs:
      filename: ${{ steps.build-rpm-packages.outputs.filename }}
      bazel-cache-id: ${{ steps.bazel-cache-hash.outputs.cache-id }}
      go-cache-id: ${{ steps.go-cache-hash.outputs.cache-id }}
    env:
      DOCKER_OPTIONS: '--name ${{ INPUTS.IMAGE }} --platform ${{ INPUTS.PLATFORM }} --attach STDERR --attach STDOUT --quiet'
      DOCKER_IMAGE: ${{ INPUTS.REGISTRY }}/${{ INPUTS.USERNAME }}/${{ INPUTS.IMAGE }}:${{ INPUTS.TAG }}
      DOCKER_MOUNTS: '--volume ${{ GITHUB.WORKSPACE }}/.rpms:/home/github/.rpms'
    steps:

      # need to check out, in order to generate file hashes.
      - uses: 'actions/checkout@v4'
      - name: Restore build cache
        if: ${{ contains(INPUTS.IMAGE, 'builder') }}
        id: bazel-cache-restore
        uses: 'actions/cache/restore@v4'
        with:
          key: bazel-cache-${{ RUNNER.ARCH }}-${{ hashFiles('./base/cvd/**.bazel') }}
          restore-keys: bazel-cache-${{ RUNNER.ARCH }}-
          path: ${{ GITHUB.WORKSPACE }}/.cache

      # https://github.com/docker/login-action
      - name: Log in to the Container registry
        uses: 'docker/login-action@v3'
        id: container-registry
        with:
          registry: ${{ INPUTS.REGISTRY }}
          username: ${{ INPUTS.USERNAME }}
          password: ${{ SECRETS.TOKEN }}

      - name: Build with logs
        run: |
          mkdir ${{ runner.temp }}/build_logs
          echo "Logs from building" > ${{ runner.temp }}/build_logs/build.logs
          exit 1

      - name: Upload logs on fail
        if: ${{ failure() }}
        uses: 'actions/upload-artifact@v4'
        with:
          name: Build failure logs
          path: ${{ runner.temp }}/build_logs

      # https://docs.docker.com/reference/cli/docker/container/run/
      # https://docs.docker.com/reference/cli/docker/container/cp/
      # --entrypoint ${{ INPUTS.ENTRY-POINT }} cannot be changed with GitHub docker.
      - name: Run ${{ INPUTS.REGISTRY }}/${{ INPUTS.USERNAME }}/${{ INPUTS.IMAGE }}:${{ INPUTS.TAG }}
        if: ${{ contains(INPUTS.IMAGE, 'builder') }}
        id: build-rpm-packages
        shell: bash
        env:
          DOCKER_MOUNTS: '--volume ${{ GITHUB.WORKSPACE }}/.cache:/home/runner/.cache --volume ${{ GITHUB.WORKSPACE }}/.rpms:/home/runner/.rpms'
        run: |
          mkdir -p ${{ GITHUB.WORKSPACE }}/.cache
          mkdir -p ${{ GITHUB.WORKSPACE }}/.rpms
          
          docker run $DOCKER_OPTIONS $DOCKER_MOUNTS $DOCKER_IMAGE

          echo "ACTION_PATH: ${{ GITHUB.ACTION_PATH }}"
          printf "Ubuntu mount-point: %s" "${{ GITHUB.WORKSPACE }}/.rpms"
          ls -la ${{ GITHUB.WORKSPACE }}/.rpms
          ls -lan ${{ GITHUB.WORKSPACE }}/.rpms

      # https://github.com/actions/upload-artifact
      - name: Retain Artifacts (*.rpm)
        if: ${{ contains(INPUTS.IMAGE, 'builder') && success() }}
        uses: 'actions/upload-artifact@v4'
        id: retain-rpm-packages
        with:
          path: '**/.rpms'
          name: android-cuttlefish-rhel9-${{ RUNNER.ARCH }}
          retention-days: 14

      # https://github.com/actions/cache
      - name: Save bazel cache
        if: ${{ contains(INPUTS.IMAGE, 'builder') }}
        id: bazel-cache-save
        uses: 'actions/cache/save@v4'
        with:
          key: ${{ steps.build-cache-restore.outputs.cache-primary-key }}
          path: ${{ GITHUB.WORKSPACE }}/.cache

      # https://docs.docker.com/reference/cli/docker/container/run/
      - name: Build integration image
        if: ${{ contains(INPUTS.IMAGE, 'integration') }}
        id: build-integration
        shell: bash
        env:
          DOCKER_MOUNTS: '--volume ${{ GITHUB.WORKSPACE }}/.rpms:/home/runner/.rpms'
        run: |
          mkdir -p ${{ GITHUB.WORKSPACE }}/.rpms
          docker run $DOCKER_OPTIONS $DOCKER_MOUNTS $DOCKER_IMAGE
          ls -la ${{ GITHUB.WORKSPACE }}/.rpms

      # https://docs.docker.com/reference/cli/docker/container/run/
      - name: Build orchestration image
        if: ${{ contains(INPUTS.DOCKER-IMAGE, 'orchestration') }}
        id: build-orchestration
        shell: bash
        env:
          DOCKER_MOUNTS: '--volume ${{ GITHUB.WORKSPACE }}/.rpms:/home/runner/.rpms'
        run: |
          mkdir -p ${{ GITHUB.WORKSPACE }}/.rpms
          docker run $DOCKER_OPTIONS $DOCKER_MOUNTS $DOCKER_IMAGE
          ls -la ${{ GITHUB.WORKSPACE }}/.rpms
